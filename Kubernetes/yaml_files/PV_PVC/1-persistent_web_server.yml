---
# Persistent Volume
apiVersion: v1
kind: PersistentVolume
metadata:
  name: web-pv
spec:
  storageClassName: manual
  capacity:
    storage: 4Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/data

## Persistent Volume - (The Physical Supply): we are telling Kubernetes: "I have 4Gi of space available at the physical path /mnt/data on my node." We gave it the storageClassName: manual to make sure it only connects to specific requests.

---
# Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi

## Persistent Volume Claim - (The User's Request): We are saying: "I need 3Gi of storage from the manual class."

## The "Binding": When we run kubectl apply, Kubernetes sees that the PV has enough space to satisfy the PVC. It "binds" them together. The PVC now acts as a pointer to that 4Gi physical folder.

---
# Pod that uses the PVC
apiVersion: v1
kind: Pod
metadata:
  name: web-pod
  labels:
    app: web
spec:
  containers:
    - name: web-container
      image: httpd:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - name: html-volume
          mountPath: /usr/local/apache2/htdocs/
  volumes:
    - name: html-volume
      persistentVolumeClaim:
        claimName: web-pvc

## Pod - (The User's Application): Now that we have a "virtual disk" (the PVC), we need to give it to our app.
#         volumes: This section tells the Pod to look for the claim named web-pvc.
#         volumeMounts: This is the most important part. It takes that persistent storage and "plugs it in" to /usr/local/apache2/htdocs inside the container.
#         Result: Anything we put in /mnt/data on our computer will suddenly appear as the website content in Apache.

---
# Service to expose the Pod
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30008

## Service - (Making it Accessible): We want to access our web server from outside the cluster.
#             The Selector: It looks for the label app: web to find our Pod.
#             The Port: It maps our computer's port 30008 to the Service's port 80, which then goes to the Pod's port 80.

## Command to run this file
# kubectl apply -f 1-persistent_web_server.yml

## Check PV and PVC Status
# kubectl get pv web-pv
# kubectl get pvc web-pvc

## Check Pod and Service Status
# kubectl get pods web-pod
# kubectl get services web-service

## If we are on a Local Machine (Minikube)
# minikube service web-service --url

## Find Node IP Address
# kubectl get nodes -o wide

## Access via Browser or Curl:
# Open browser and type: http://<NODE-IP>:30008

## Cleanup Resources
# kubectl delete -f 1-persistent_web_server.yml